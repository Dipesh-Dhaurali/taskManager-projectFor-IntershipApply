{% extends 'home/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 mt-5">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 fw-bold">Register a New Account</h3>
                <form id="register-form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="Choose a username">
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="Enter email address">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Choose a password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">Register</button>
                    <p class="text-center text-secondary small mb-0">Already have an account? <a href="{% url 'login_page' %}" class="text-primary text-decoration-none">Login here</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('{% url "api_register" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                showNotification('Account created successfully! Please login.');
                setTimeout(() => window.location.href = "{% url 'login_page' %}", 2000);
            } else {
                showNotification(Object.values(result).flat().join(', '), 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('An unexpected error occurred.', 'error');
        }
    });
</script>
{% endblock %}

{% extends 'home/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 mt-5">
            <div class="card-body">
                <h3 class="card-title text-center mb-4 fw-bold">Login to Your Account</h3>
                <form id="login-form">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="Enter username">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">Login</button>
                    <p class="text-center text-secondary small mb-0">Don't have an account? <a href="{% url 'register_page' %}" class="text-primary text-decoration-none">Register here</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('{% url "token_obtain_pair" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                localStorage.setItem('access_token', result.access);
                localStorage.setItem('refresh_token', result.refresh);
                showNotification('Logged in successfully!');
                setTimeout(() => window.location.href = "{% url 'dashboard' %}", 1000);
            } else {
                showNotification('Invalid Credentials. Please try again.', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('An unexpected error occurred.', 'error');
        }
    });
</script>
{% endblock %}
